<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" width="160" height="40" role="img" aria-label="EcoSys logo">
  <title>EcoSys</title>

  <!-- Icon mark: leaf with circuit-node root -->
  <g transform="translate(0, 4)">

    <!-- Leaf shape -->
    <path
      d="M16 2 C10 2 4 8 4 16 C4 22 8 27 14 29 C14 29 14 24 16 20 C18 24 18 29 18 29 C24 27 28 22 28 16 C28 8 22 2 16 2 Z"
      fill="#5a8a5a"
    />

    <!-- Central vein -->
    <line x1="16" y1="6" x2="16" y2="29" stroke="#a8c890" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Left vein -->
    <line x1="16" y1="13" x2="9"  y2="19" stroke="#a8c890" stroke-width="0.9" stroke-linecap="round"/>

    <!-- Right vein -->
    <line x1="16" y1="13" x2="23" y2="19" stroke="#a8c890" stroke-width="0.9" stroke-linecap="round"/>

    <!-- Root stem -->
    <line x1="16" y1="29" x2="16" y2="34" stroke="#5a8a5a" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Root branches -->
    <line x1="16" y1="34" x2="10" y2="38" stroke="#5a8a5a" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="16" y1="34" x2="22" y2="38" stroke="#5a8a5a" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Circuit nodes at root tips -->
    <circle cx="10" cy="38" r="1.5" fill="#7ab87a"/>
    <circle cx="22" cy="38" r="1.5" fill="#7ab87a"/>
    <circle cx="16" cy="34" r="1.5" fill="#7ab87a"/>

  </g>

  <!-- Wordmark: EcoSys -->
  <text
    x="38"
    y="27"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="600"
    letter-spacing="-0.3"
    fill="#2d4a2d"
  >Eco<tspan fill="#5a8a5a">Sys</tspan></text>

</svg>
